<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Undertale OBS Display</title>
  <style>
    @font-face { font-family: DTM; src: url("fonts/DTM-Mono.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: UndertaleSans; src: url("fonts/UndertaleSans.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: UndertalePapyrus; src: url("fonts/PapyrusUndertale.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: UndertaleWingdings; src: url("fonts/PixelatedWingdings.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: Earthbound; src: url("fonts/EBMain.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: DTMExtended; src: url("fonts/Determination-Extended.ttf") format("truetype"); font-display: block; }
    @font-face { font-family: UbuntuPixel; src: url("fonts/Ubuntu-Regular.ttf") format("truetype"); font-display: block; }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-smooth: never;
      -webkit-font-smoothing: none;
    }

    .undertale-dialogue {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: none;
      width: 578px;
      height: 152px;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .undertale-dialogue.is-visible { display: block; }

    .fallback-render {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border: 6px solid #fff;
      color: #fff;
      background: #040204;
    }

    .sprite-slot {
      position: absolute;
      inset: 0 auto auto 0;
      display: grid;
      place-items: center;
      width: 134px;
      height: 140px;
      overflow: hidden;
    }

    .avatar {
      display: block;
      width: 134px;
      height: 140px;
      max-width: none;
      max-height: none;
      object-fit: fill;
      image-rendering: pixelated;
    }

    .avatar.legacy {
      width: auto;
      height: auto;
      object-fit: initial;
      transform: scale(2);
    }

    .text-layer {
      position: absolute;
      top: 12px;
      left: 138px;
      display: block;
      width: 520px;
      height: 116px;
      min-height: 0;
      padding: 0 0 0 40px;
      overflow: hidden;
      font: 33px/40px DTM, monospace;
      letter-spacing: 0;
      text-indent: -40px;
      white-space: pre-wrap;
      transform: scale(.8, .9);
      transform-origin: top left;
    }

    .asterisk::after { content: " "; }

    .official-render {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: block;
      width: 578px;
      height: 152px;
      opacity: 0;
      object-fit: fill;
      pointer-events: none;
      image-rendering: pixelated;
    }

    .undertale-dialogue.is-official .official-render { opacity: 1; }
  </style>
</head>
<body>
  <div class="undertale-dialogue" aria-live="polite">
    <div class="fallback-render">
      <div class="sprite-slot">
        <img class="avatar legacy" src="img/sans-normal.png" alt="">
      </div>
      <div class="text-layer">
        <span class="asterisk">*</span><span id="textbox"></span>
      </div>
    </div>
    <img class="official-render" alt="">
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const SPEED = 50;
    const MAX_TEXT_WIDTH = 480;
    const MAX_LINES = 3;
    const PAUSE_CHARACTERS = new Set([',', '!', '?']);

    const container = document.querySelector('.undertale-dialogue');
    const avatar = container.querySelector('.avatar');
    const asterisk = container.querySelector('.asterisk');
    const textLayer = container.querySelector('.text-layer');
    const box = document.getElementById('textbox');
    const officialRender = container.querySelector('.official-render');
    const voice = new Audio('voice_sans.mp3');

    let currentDialogueId = null;
    let sequence = 0;
    let typing = false;
    let officialReady = false;

    function isLegacyPapyrus(dialogue) {
      return String(dialogue.expr || '').split('/').pop().startsWith('papyrus-');
    }

    function fontFamilyFor(code) {
      const value = String(code || 'determination').toLocaleLowerCase('en');
      if (value.includes('papyrus')) return 'UndertalePapyrus, DTM, monospace';
      if (value.includes('wing')) return 'UndertaleWingdings, DTM, monospace';
      if (value.includes('sans')) return 'UndertaleSans, DTM, monospace';
      if (value.includes('earth') || value.includes('ebmain')) return 'Earthbound, DTM, monospace';
      if (value.includes('ubuntu')) return 'UbuntuPixel, DTM, monospace';
      if (value.includes('extended') || value.includes('determination-ex')) return 'DTMExtended, DTM, monospace';
      return 'DTM, monospace';
    }

    function titleCase(value) {
      return value.replace(/(^|\s)(\p{L})/gu, (_, prefix, letter) => prefix + letter.toLocaleUpperCase('fr'));
    }

    function transformDialogue(text, transform) {
      const value = String(text || '');
      if (transform === 'uppercase') return value.toLocaleUpperCase('fr');
      if (transform === 'lowercase') return value.toLocaleLowerCase('fr');
      if (transform === 'title') return titleCase(value);
      return value;
    }

    function measureTextWidth(text) {
      const canvas = measureTextWidth.canvas || (measureTextWidth.canvas = document.createElement('canvas'));
      const context = canvas.getContext('2d');
      const style = getComputedStyle(textLayer);
      context.font = `${style.fontSize} ${style.fontFamily}`;
      return context.measureText(text).width;
    }

    function splitLongWord(word, maxWidth) {
      const chunks = [];
      let chunk = '';

      for (const character of word) {
        const candidate = chunk + character;
        if (chunk && measureTextWidth(candidate) > maxWidth) {
          chunks.push(chunk);
          chunk = character;
        } else {
          chunk = candidate;
        }
      }

      if (chunk) chunks.push(chunk);
      return chunks;
    }

    function wrapParagraph(paragraph, maxWidth) {
      if (!paragraph.trim()) return [''];

      const words = paragraph.trim().split(/\s+/);
      const lines = [];
      let line = '';

      for (const originalWord of words) {
        const pieces = measureTextWidth(originalWord) > maxWidth
          ? splitLongWord(originalWord, maxWidth)
          : [originalWord];

        for (const word of pieces) {
          const candidate = line ? `${line} ${word}` : word;
          if (!line || measureTextWidth(candidate) <= maxWidth) {
            line = candidate;
          } else {
            lines.push(line);
            line = word;
          }
        }
      }

      if (line) lines.push(line);
      return lines;
    }

    function wrapText(text) {
      return text
        .split(/\r?\n/)
        .flatMap(paragraph => wrapParagraph(paragraph, MAX_TEXT_WIDTH))
        .slice(0, MAX_LINES)
        .join('\n');
    }

    function playBeep() {
      const sound = voice.cloneNode();
      sound.playbackRate = 0.8 + Math.random() * 0.4;
      sound.play().catch(() => {});
    }

    function delay(milliseconds) {
      return new Promise(resolve => setTimeout(resolve, milliseconds));
    }

    function showOfficialRenderIfReady() {
      if (!typing && officialReady) container.classList.add('is-official');
    }

    async function showDialogue(dialogue) {
      const token = ++sequence;
      const legacyPapyrus = isLegacyPapyrus(dialogue);
      const isLegacy = !dialogue.previewUrl;
      const textTransform = dialogue.textTransform || (legacyPapyrus ? 'uppercase' : 'lowercase');
      const showAsterisk = typeof dialogue.asterisk === 'boolean' ? dialogue.asterisk : !legacyPapyrus;

      currentDialogueId = dialogue.id;
      typing = true;
      officialReady = false;
      container.classList.remove('is-official');
      container.classList.add('is-visible');
      officialRender.removeAttribute('src');
      avatar.classList.toggle('legacy', isLegacy);
      avatar.src = dialogue.previewUrl || `${dialogue.expr}.png`;
      avatar.alt = dialogue.characterName || '';
      asterisk.hidden = !showAsterisk;
      textLayer.style.fontFamily = fontFamilyFor(dialogue.font || (legacyPapyrus ? 'papyrus' : 'sans'));
      box.textContent = '';

      if (document.fonts && document.fonts.ready) await document.fonts.ready;
      if (token !== sequence) return;

      const renderedText = wrapText(transformDialogue(dialogue.text, textTransform));
      for (const character of renderedText) {
        if (token !== sequence) return;
        box.textContent += character;
        playBeep();
        await delay(PAUSE_CHARACTERS.has(character) ? SPEED * 8 : SPEED);
      }

      if (token !== sequence) return;
      typing = false;
      showOfficialRenderIfReady();
    }

    function loadOfficialRender({ id, image }) {
      if (id !== currentDialogueId || !image) return;

      const preload = new Image();
      preload.src = image;
      preload.decode()
        .catch(() => {})
        .then(() => {
          if (id !== currentDialogueId) return;
          officialRender.src = image;
          officialReady = true;
          showOfficialRenderIfReady();
        });
    }

    function hideDialogue() {
      sequence += 1;
      currentDialogueId = null;
      typing = false;
      officialReady = false;
      box.textContent = '';
      officialRender.removeAttribute('src');
      container.classList.remove('is-visible', 'is-official');
    }

    const socket = io();
    socket.on('dialogue', showDialogue);
    socket.on('dialogue-rendered', loadOfficialRender);
    socket.on('dialogue-hide', hideDialogue);

    window.addEventListener('keydown', event => {
      if (event.key === '&') socket.emit('next');
    });
  </script>
</body>
</html>
